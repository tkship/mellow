name: mellow
description: "Mellow — 你的 AI 英语老师"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shadcn_ui: ^0.54.0
  dio: ^5.7.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.5
  record: ^5.2.0
  just_audio: ^0.9.43
  path: ^1.9.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/vignettes/
    - assets/vignettes/constellations_list/
    - assets/vignettes/drink_rewards_list/
    - assets/vignettes/spending_tracker/
    - assets/vignettes/plant_forms/
    - assets/vignettes/bubble_tab_bar/
    - assets/vignettes/parallax_travel_cards_list/
    - assets/vignettes/dark_ink_transition/
    - assets/vignettes/particle_swipe/
    - assets/vignettes/sparkle_party/
