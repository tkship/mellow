name: mellow_app
description: Mellow — 英语教学智能体 Flutter 客户端

publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  dio: ^5.4.0
  shared_preferences: ^2.2.0
  record: ^5.0.0
  just_audio: ^0.9.0
  web_socket_channel: ^2.4.0
  intl: ^0.19.0
  flutter_markdown: ^0.7.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  very_good_analysis: ^10.2.0

dependency_overrides:
  record_platform_interface: 1.4.0
  record_web: 1.3.0

flutter:
  uses-material-design: true
