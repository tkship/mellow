name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production API)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://43.139.242.133:6763/api/v1
        run: npm run build

      - name: Add Capacitor Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync web assets to Android
        working-directory: frontend
        run: npx cap sync android

      - name: Configure Android cleartext traffic
        working-directory: frontend/android/app/src/main
        run: |
          # Ensure AndroidManifest.xml allows cleartext HTTP (backend is HTTP, not HTTPS)
          sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|g' AndroidManifest.xml
          # Also add networkSecurityConfig if not already present
          if ! grep -q 'android:networkSecurityConfig' AndroidManifest.xml; then
            sed -i 's|android:usesCleartextTraffic="true"|android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"|' AndroidManifest.xml
          fi

      - name: Create network security config
        working-directory: frontend/android/app/src/main
        run: |
          mkdir -p res/xml
          cat > res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">43.139.242.133</domain>
                  <domain includeSubdomains="true">localhost</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             frontend/android/app/build/outputs/apk/debug/mellow-v0.1.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/debug/mellow-v0.1.apk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}