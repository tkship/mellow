name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # v0.2 → 0.2
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        # VITE_API_BASE_URL 留空 = 相对路径 /api/v1（单进程部署，前后端同源）
        run: npm run build

      - name: Add Capacitor Android platform
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add"
          fi

      - name: Sync web assets to Android
        working-directory: frontend
        run: npx cap sync android

      - name: Configure Android cleartext traffic
        working-directory: frontend/android/app/src/main
        run: |
          # 确保允许 HTTP 明文请求（后端可能使用 HTTP）
          sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|g' AndroidManifest.xml
          if ! grep -q 'android:networkSecurityConfig' AndroidManifest.xml; then
            sed -i 's|android:usesCleartextTraffic="true"|android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"|' AndroidManifest.xml
          fi

      - name: Create network security config
        working-directory: frontend/android/app/src/main
        run: |
          mkdir -p res/xml
          cat > res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">localhost</domain>
                  <domain includeSubdomains="true">10.0.2.2</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             "frontend/android/app/build/outputs/apk/debug/mellow-v${VERSION}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/debug/mellow-v*.apk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}